<!DOCTYPE html>
<html lang="vi">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Đặt Phòng - Sang Nhất Hotel</title>

    <link rel="stylesheet" href="assets/css/booking.css">
    
</head>

<body>

<!-- HEADER -->

<header>

    <div class="logo">
        SANG NHẤT HOTEL
    </div>

    <nav>

        <a href="index.html">Trang chủ</a>

        <a href="index.html#rooms">Phòng</a>

        <a href="index.html#services">Dịch vụ</a>

        <a href="booking.html">Đặt phòng</a>

        <a href="contact.html">Liên hệ</a>
        <a href="about.html">Giới thiệu</a>
        <a href="labs.html">Lab thực hành</a>

        <a href="login.html">Đăng nhập</a>

    </nav>

</header>


<!-- BOOKING -->

<section class="booking-section">

    <div class="booking-container">

        <!-- IMAGE -->

        <div class="booking-image">

            <img src="assets/images/rooms/room1.png">

        </div>

        <!-- FORM -->

        <div class="booking-form">

            <h2>Thông Tin Đặt Phòng</h2>

            <form onsubmit="showBooking(event)">

                <!-- NAME -->

                <div class="form-group">

                    <label>Họ và tên</label>

                    <input 
                        type="text"
                        placeholder="Nhập họ tên"
                        required
                    >

                </div>

                <!-- PHONE -->

                <div class="form-group">

                    <label>Số điện thoại</label>

                    <input 
                        type="text"
                        placeholder="Nhập số điện thoại"
                        required
                    >

                </div>

                <!-- EMAIL -->

                <div class="form-group">

                    <label>Email</label>

                    <input 
                        type="email"
                        placeholder="Nhập email"
                        required
                    >

                </div>

                <!-- DATE -->

                <div class="form-row">

                    <div class="form-group">

                        <label>Check In</label>

                        <input type="date" required>

                    </div>

                    <div class="form-group">

                        <label>Check Out</label>

                        <input type="date" required>

                    </div>

                </div>

                <!-- ROOM -->

                <div class="form-group">

                    <label>Loại phòng</label>

                    <select required>

                        <option value="">
                            -- Chọn phòng --
                        </option>

                        <option>
                            VIP Suite
                        </option>

                        <option>
                            Deluxe Room
                        </option>

                        <option>
                            Standard Room
                        </option>

                        <option>
                            Family Room
                        </option>

                    </select>

                </div>

                <!-- NOTE -->

                <div class="form-group">

                    <label>Ghi chú</label>

                    <textarea 
                        rows="5"
                        placeholder="Yêu cầu thêm..."
                        required
                    ></textarea>

                </div>

                <!-- BUTTON -->

                <button type="submit" class="book-btn">

                    Xác Nhận Đặt Phòng

                </button>

            </form>

        </div>

    </div>

</section>

<!-- FOOTER -->

<footer>

    <div class="footer-content">

        <h2>SANG NHẤT HOTEL</h2>

        <p>
            Luxury Hotel Management Website
        </p>

        <p>
            📍 TP.HCM, Việt Nam
        </p>

        <p>
            ☎ 0123 456 789
        </p>

        <p>
            ✉ sangnhathotel@gmail.com
        </p>

    </div>

    <div class="copyright">

        © 2026 Sang Nhất Hotel.
        All Rights Reserved.

    </div>

</footer>

<!-- JAVASCRIPT -->

<script>

function showBooking(event){

    event.preventDefault();

    const inputs = document.querySelectorAll(
        "input, textarea, select"
    );

    let isValid = true;

    inputs.forEach(input => {

        if(input.value.trim() === ""){

            isValid = false;

            input.style.border = "2px solid red";

        }
        else{

            input.style.border = "none";

        }

    });

    if(!isValid){

        alert("Vui lòng nhập đầy đủ thông tin!");

        return;

    }

    alert("Đặt phòng thành công!");

    window.location.href = "index.html";

}

</script>

</body>

</html>
